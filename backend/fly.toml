# fly.toml app configuration for the DJ Agent audio-analysis backend.
# Deploy from this directory with: cd backend && fly deploy

app = "djassistant"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  MAX_UPLOAD_MB = "60"
  ANALYSIS_SAMPLE_RATE = "22050"
  MAX_ANALYSIS_SECONDS = "480"
  ANALYSIS_HOP_LENGTH = "1024"
  ALLOWED_ORIGINS = "https://*.vercel.app"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
